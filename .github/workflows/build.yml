name: Build GalaxyToolV6

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install missing runtime libs
        run: |
          pip install websockets
          pip install aiohttp
          pip install qasync
          pip install PyQt5

      - name: Build EXE (PyInstaller)
        run: pyinstaller --noconfirm --onefile --noconsole --name GalaxyToolV6 main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GalaxyToolV6
          path: dist/GalaxyToolV6.exe
