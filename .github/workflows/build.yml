name: Build GalaxyToolV6

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: pyinstaller --noconfirm --clean --onefile --noconsole --name GalaxyToolV6 main.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: GalaxyToolV6
          path: dist/GalaxyToolV6.exe
